<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>addEventListener - 연습 (5)</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    input {
      width: 300px;
      height: 38px;
      text-align: center;
    }
    #result {
      margin-top: 50px;
      padding: 15px 20px;
      background-color: azure;
      text-align: center;
      font-size: 2.5em;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="contents">
    <input type="text" id="word">
    <button id="bttn">글자 수 확인</button>
  </div>
  <div id="result"></div>
  <script>
    // 입력한 단어의 길이 알아내기
    const bttn = document.querySelector("#bttn");
    const result = document.querySelector("#result");

    bttn.addEventListener("click", function() {
      const word = document.querySelector("#word").value;
      let wordNum = word.length;
      result.innerText = `${wordNum}`;
    });
  </script>
</body>
</html>
