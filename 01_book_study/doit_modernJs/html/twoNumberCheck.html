<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>입력한 숫자가 모두 짝수인지 체크하기</title>
</head>
<body>
  <script>
    const num1 = parseInt(prompt("첫 번째 양의 정수를 입력하세요."));
    const num2 = parseInt(prompt("두 번째 양의 정수를 입력하세요."));
    let str;

    if (num1 % 2 === 0 && num2 % 2 === 0) {
      str = "두 수 모두 짝수입니다.";
    } else {
      str = "짝수가 아닌 수가 있습니다.";
    }

    alert(str);
  </script>
</body>
</html>
