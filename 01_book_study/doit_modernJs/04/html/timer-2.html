<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인사말을 5회 반복한 후 멈추기</title>
</head>
<body>
  <script>
    let counter = 0;

    let timer = setInterval(() => {
      console.log("안녕하세요?");
      counter++;
      
      if (counter === 5) {
        clearInterval(timer);
      }
    }, 2000);
  </script>
</body>
</html>
