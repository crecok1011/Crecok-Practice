<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인수의 개수와 상관없이 숫자를 더하는 프로그램</title>
</head>
<body>
  <script>
    function addNum(...numbers) {
      let sum = 0;

      for (number of numbers) {
        sum += number;
      }
      return sum;
    }

    console.log(addNum(1, 3));
    console.log(addNum(1, 3, 5, 7));
  </script>
</body>
</html>
