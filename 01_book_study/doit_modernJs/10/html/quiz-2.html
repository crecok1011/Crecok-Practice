<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배열의 첫 번째 요소를 뺀 나머지 요소 반환</title>
  <style>
    #container {
      width:500px;
      margin:20px auto;
    }
    h1 {
      font-size:1.5em;
    }		
	</style>
</head>
<body>
  <div id="container">
    <h1>원래 배열 요소</h1>
    <div id="origin"></div>
    
    <!-- 만약 배열의 길이가 1이면 배열 전체를 반환한다. -->
    <h1>첫번째 요소를 제외한 나머지 요소</h1>
    <div id="result"></div>
  </div>
  <script>
    const origin = document.querySelector("#origin");
    const result = document.querySelector("#result");
    let numbers = [2, 4, 6, 8, 10];

    function tail(array) {
      if(array.length > 1) {
        return array.slice(1);
      } else if (array.length === 1) {
        return array;
      }
    }

    origin.innerText = numbers;
    result.innerText = tail(numbers);
  </script>
</body>
</html>
