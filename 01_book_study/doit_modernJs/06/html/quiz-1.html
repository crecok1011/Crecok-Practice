<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마우스 오버 시 이미지 변경하기</title>
  <style>
    #container {
      width: 600px;
      margin: 20px auto;
    }
    h1 {
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div id="container">
    <h1>마우스 오버하면 이미지 바꾸기</h1>
    <img src="../images/pic-1.jpg" alt="">
  </div>
  <script>
    // addEventListener를 이용해 마우스 오버, 마우스 아웃마다 이미지 변경하기
    const img = document.querySelector("img");
    
    img.addEventListener("mouseover", () => {
      img.src = '../images/pic-6.jpg';
    });

    img.addEventListener("mouseout", () => {
      img.src = "../images/pic-1.jpg";
    });
  </script>
</body>
</html>
