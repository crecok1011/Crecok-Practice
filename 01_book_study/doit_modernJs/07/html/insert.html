<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>버튼을 누르면 리스트 중간에 텍스트 추가</title>
  <style>
    button {
      display: block;
    }
  </style>
</head>
<body>
  <h1>노드 리스트 살펴보기</h1>
  <p>HTML</p>
  <p>CSS</p>
  <p>Javascript</p>
  <button>텍스트 추가</button>
  <script>
    // insertBefore를 이용해 p 태그 중간에 텍스트 추가
    const bttn = document.querySelector("button");

    bttn.addEventListener("click", () => {
      let newP = document.createElement("p");
      let newTxt = document.createTextNode("Typescript");
      newP.appendChild(newTxt);

      let stP = document.querySelectorAll("p")[2];
      document.body.insertBefore(newP, stP);
    });
  </script>
</body>
</html>
