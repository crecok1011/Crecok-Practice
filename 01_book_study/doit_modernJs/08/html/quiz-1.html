<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내가 살아온 시간 계산하기</title>
  <link rel="stylesheet" href="../css/quiz-1.css">
</head>
<body>
  <div id="container">
    <h1>내가 살아온 시간</h1>
    <form>
      <label><input type="text" id="year">년 </label>
      <label><input type="text" id="month">월 </label>
      <label><input type="text" id="date">일 </label>
      <button type="button" id="bttn">계산</button>
    </form>

    <div id="result">
     <p id="current"></p>
      <p id="days" class="accent"></p>
      <p id="hours" class="accent"></p>
    </div>
  </div>
  <!-- Date 객체와 Math 객체로 내가 살아온 날짜, 시간 계산하기 -->
  <script src="../js/quiz-1.js"></script>
</body>
</html>
