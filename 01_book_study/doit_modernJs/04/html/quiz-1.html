<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>양수/음수 판별 프로그램</title>
</head>
<body>
  <script>
    function numberCheck(num) {
      if(num > 0) {
        alert(`${num}은 양수입니다.`)
      } else if (num < 0) {
        alert(`${num}은 음수입니다.`);
      } else {
        alert("0을 입력했습니다.");
      }
    }

    const inputNum = parseInt(prompt("숫자를 입력하세요."));
    if (!isNaN(inputNum)) {
      numberCheck(inputNum);
    }
  </script>
</body>
</html>
