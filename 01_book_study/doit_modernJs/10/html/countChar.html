<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문자열에서 특정 문자열이 몇 번 나타나는지 확인하기</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <script>
    function counting(str, ch) {
      let count = 0;

      for (let i = 0; i < str.length; i++) {
        if (str[i] === ch) {
          count += 1;
        }
      }
      return count;
    }

    const string = prompt("문자를 입력하세요.");
    const letter = prompt("어떤 문자를 체크하시겠습니까?");

    const result = counting(string, letter);
    document.write(`${string}에는 ${letter}이(가) <span style="color:red; margin: 0 4px;">${result}개</span> 있습니다.`);
  </script>
</body>
</html>
